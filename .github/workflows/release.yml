name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v2.0.0)'
        required: true
        type: string

env:
  GOPROXY: https://proxy.golang.org,direct
  GO_VERSION: '1.21'

jobs:
  # Build and test
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        run: |
          cd src/mcp-policy-proxy
          go build -o hexstrike-proxy .

      - name: Run tests
        run: |
          cd src/mcp-policy-proxy
          go test -v -race -short ./...

      - name: Go vet
        run: |
          cd src/mcp-policy-proxy
          go vet ./...

  # Create checksums
  checksum:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build for all platforms
        run: |
          mkdir -p dist
          
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              ext=""
              if [ "$os" == "windows" ]; then
                ext=".exe"
              fi
              
              GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build \
                -ldflags="-s -w" \
                -o dist/hexstrike-proxy-${os}-${arch}${ext} \
                src/mcp-policy-proxy
              
              sha256sum dist/hexstrike-proxy-${os}-${arch}${ext}
            done
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*

  # Build Docker image
  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./src/mcp-policy-proxy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Create GitHub Release
  release:
    runs-on: ubuntu-latest
    needs: [build, checksum, docker]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true
          files: |
            dist/*
          body: |
            ## HexStrike Defense v${{ env.VERSION }}

            Security-hardened MCP policy proxy with:
            - JWT Bearer authentication
            - SSRF protection
            - Input sanitization
            - Circuit breaker & retry
            - Structured logging

            ### Downloads
            - Linux (amd64/arm64)
            - macOS (amd64/arm64)
            - Windows (amd64/arm64)

            ### Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ env.VERSION }}
            ```

            ### Security
            Report vulnerabilities: [Security Policy](https://github.com/${{ github.repository }}/security/policy)
