name: Security Hardening

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PROXY_DIR: src/mcp-policy-proxy

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
      - name: Run tests
        working-directory: ${{ env.PROXY_DIR }}
        run: go test -race -short ./...

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: go
      - name: Build
        working-directory: ${{ env.PROXY_DIR }}
        run: go build ./...
      - name: Analyze
        uses: github/codeql-action/analyze@v3

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
      - name: Scan
        working-directory: ${{ env.PROXY_DIR }}
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./... || true

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
      - name: Download deps
        working-directory: ${{ env.PROXY_DIR }}
        run: go mod download
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: '-no-fail ./...'

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit