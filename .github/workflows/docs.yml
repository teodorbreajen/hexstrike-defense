# Documentation Generation Workflow

name: Generate Documentation

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'manifests/**'
      - 'scripts/**'
      - 'docs/tools/doc_engine/**'
      - 'Makefile'
  pull_request:
    paths:
      - 'src/**'
      - 'manifests/**'
      - 'scripts/**'
      - 'docs/tools/doc_engine/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Generate documentation
        run: |
          python docs/tools/doc_engine/main.py --root . --output docs/generated

      - name: Validate generated files
        run: |
          echo "Checking generated files..."
          test -f docs/generated/index.md && echo "✓ index.md"
          test -f docs/generated/high_level_architecture.md && echo "✓ architecture.md"
          test -f docs/generated/component_catalog.md && echo "✓ components.md"
          test -f docs/generated/security_model.md && echo "✓ security.md"

      - name: Commit documentation changes
        if: github.event_name == 'push'
        run: |
          git config --local user.email "docs@hexstrike.ai"
          git config --local user.name "Documentation Generator"
          
          # Check if there are changes
          if git diff --quiet docs/generated/; then
            echo "No documentation changes to commit"
          else
            git add docs/generated/
            git commit -m "docs: auto-generate documentation
            
            Auto-generated documentation from latest code changes.
            
            Generated by GitHub Actions"
            git push
          fi

  validate-docs:
    runs-on: ubuntu-latest
    needs: generate-docs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Check for broken links
        run: |
          # Install link checker
          pip install markdown-link-check
          
          # Check generated index
          for file in docs/generated/*.md; do
            echo "Checking: $file"
            # Basic check - verify internal links exist
            grep -oE '\[.*\]\([^)]+\)' "$file" | while read -r link; do
              echo "  Found link: $link"
            done
          done

      - name: Generate summary
        run: |
          echo "## Documentation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated files:" >> $GITHUB_STEP_SUMMARY
          ls -la docs/generated/*.md | wc -l | xargs echo "  Total files:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Sections:" >> $GITHUB_STEP_SUMMARY
          ls docs/generated/*.md | xargs -I{} basename {} .md | sed 's/^/  - /' >> $GITHUB_STEP_SUMMARY
