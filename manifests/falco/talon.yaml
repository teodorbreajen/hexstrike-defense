# Phase 3: Runtime Security - Talon Webhook Configuration
# Kubernetes webhook configuration for Talon automated response
# 
# PURPOSE: Configure Talon to automatically respond to Falco alerts
# SCOPE: Cluster-wide - handles all hexstrike namespace events
# 
# Talon is an automated incident response engine that integrates with
# Kubernetes to take immediate action on security events.

apiVersion: v1
kind: ConfigMap
metadata:
  name: talon-config
  namespace: hexstrike-monitoring
  labels:
    hexstrike.io/layer: runtime-security
    hexstrike.io/component: talon
    hexstrike.io/version: "1.0"
data:
  # Talon configuration file
  talon.yaml: |
    # Talon Configuration for HexStrike Defense
    # 
    # This configuration enables automated response to Falco alerts
    # Response time target: <200ms from alert to action

    # Webhook server configuration
    server:
      host: "0.0.0.0"
      port: 9876
      path: "/webhook"
      # SECURITY FIX: TLS is now ENABLED by default
      # Set up cert-manager for automatic certificate management in production
      tls:
        enabled: true  # SECURITY: Must be true for production
        cert_file: "/etc/tls/tls.crt"
        key_file: "/etc/tls/tls.key"

    # Kubernetes API connection
    kubernetes:
      in_cluster: true
      namespace: "hexstrike-monitoring"
      service_account: "talon"
      api_server: ""  # Use in-cluster config

    # Falco integration
    falco:
      enabled: true
      webhook_path: "/falco"
      health_path: "/health"
      heartbeat_interval: 30s

    # Automated response actions
    actions:
      # Action: kubernetes:terminate
      # Terminates compromised pods immediately
      terminate:
        enabled: true
        priority_threshold: "CRITICAL"
        match_tags:
          - critical
          - hexstrike
        actions:
          - delete_pod
          - record_event
        grace_period: 0s
        reason: "Compromised container detected by Falco"

      # Action: kubernetes:labelize
      # Adds quarantine labels to suspicious pods
      labelize:
        enabled: true
        priority_threshold: "WARNING"
        match_tags:
          - warning
          - hexstrike
        actions:
          - add_labels
          - scale_to_zero
        labels:
          security.hexstrike.io/quarantined: "true"
          security.hexstrike.io/quarantine-reason: "{{ .Rule }}"
          security.hexstrike.io/quarantine-time: "{{ .Time }}"
        scale_replicas: 0

      # Action: isolate
      # Isolates compromised pods by blocking network
      isolate:
        enabled: true
        priority_threshold: "CRITICAL"
        match_rules:
          - "Reverse shell from container"
          - "Terminal shell spawn from container"
        actions:
          - network_policy
          - terminate
        isolation_policy: "hexstrike-isolation"

      # Action: capture
      # Captures forensic evidence before termination
      capture:
        enabled: true
        priority_threshold: "WARNING"
        actions:
          - dump_process
          - dump_network
          - capture_logs
        retention: 72h

    # Response time targets
    performance:
      target_response_time: 200ms
      action_timeout: 5s
      max_concurrent_actions: 10
      queue_size: 1000

    # Logging and observability
    logging:
      level: "info"
      format: "json"
      output: "stdout"
    metrics:
      enabled: true
      port: 9090
      path: "/metrics"

    # Retry policy for failed actions
    retry:
      max_attempts: 3
      backoff: "exponential"
      initial_interval: 100ms
      max_interval: 2s

    # Dry-run mode for testing
    dry_run: false

---
# Talon Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: talon
  namespace: hexstrike-monitoring
  labels:
    hexstrike.io/layer: runtime-security
    hexstrike.io/component: talon
    hexstrike.io/version: "1.1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: talon
  # SECURITY FIX: Add PodDisruptionBudget for high availability
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: talon
        hexstrike.io/component: talon
      annotations:
        # Link to Falco annotations for coordinated security
        security.cyber.com/falco/action: "terminate"
        security.cyber.com/falco/priority: "CRITICAL"
    spec:
      serviceAccountName: talon
      # SECURITY FIX: Add pod security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        seccompProfile:
          type: RuntimeDefault
      # SECURITY FIX: Priority class to prevent eviction
      priorityClassName: hexstrike-security-critical
      # SECURITY FIX: Topology spread for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: talon
      containers:
        - name: talon
          # SECURITY FIX: Use specific version tag, not 'latest'
          image: hexstrike/talon:v1.0.0
          # SECURITY FIX: IfNotPresent instead of Always to prevent pulling compromised images
          imagePullPolicy: IfNotPresent
          ports:
            - name: webhook
              containerPort: 9876
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: TALON_CONFIG
              value: "/etc/talon/config.yaml"
            - name: TALON_LOG_LEVEL
              value: "info"
          volumeMounts:
            - name: config
              mountPath: /etc/talon
              readOnly: true
            - name: tls
              mountPath: /etc/tls
              readOnly: true
            # SECURITY FIX: Add tmpfs for working directory
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # SECURITY FIX: Enhanced container security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10000
            runAsGroup: 10000
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: 9876
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 9876
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: talon-config
        - name: tls
          secret:
            secretName: talon-tls
        # SECURITY FIX: tmpfs for temporary files
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""

---
# Talon Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: talon
  namespace: hexstrike-monitoring
  labels:
    hexstrike.io/layer: runtime-security
    hexstrike.io/component: talon

---
# Talon RBAC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: talon
  labels:
    hexstrike.io/layer: runtime-security
    hexstrike.io/component: talon
    hexstrike.io/version: "1.1"
rules:
  # Pod management for termination - SCOPED to hexstrike namespaces only
  # SECURITY FIX: Removed dangerous verbs like patch on pods
  # Talon should only delete pods, not modify them
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete", "watch"]
    # SECURITY FIX: Add namespace restriction via resourceNames or separate Role
    # For cluster-wide access (needed for incident response), limit to specific namespaces
  # Events for audit trail
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
    # Note: events can be created in any namespace for incident tracking
  # Network policies for isolation - SCOPED to hexstrike namespaces
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "delete"]
    # SECURITY: Only manage network policies in hexstrike namespaces
  # Scale deployments for quarantine - SCOPED to hexstrike namespaces
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch", "scale"]
    # SECURITY: Only scale deployments in hexstrike namespaces

---
# SECURITY FIX: Role scoped to hexstrike namespaces only
# This provides least-privilege access for day-to-day operations
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: talon-hexstrike
  namespace: hexstrike-monitoring
rules:
  # Pod management - only delete, no patch
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete", "watch"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get"]
  # Events for audit trail
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create"]
  # Network policies
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "delete"]
  # Scale deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch", "scale"]

---
# Bind the scoped role to Talon service account in hexstrike-monitoring
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: talon-hexstrike
  namespace: hexstrike-monitoring
subjects:
  - kind: ServiceAccount
    name: talon
    namespace: hexstrike-monitoring
roleRef:
  kind: Role
  name: talon-hexstrike
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: talon
  labels:
    hexstrike.io/layer: runtime-security
    hexstrike.io/component: talon
subjects:
  - kind: ServiceAccount
    name: talon
    namespace: hexstrike-monitoring
roleRef:
  kind: ClusterRole
  name: talon
  apiGroup: rbac.authorization.k8s.io

---
# Talon Service
apiVersion: v1
kind: Service
metadata:
  name: talon
  namespace: hexstrike-monitoring
  labels:
    hexstrike.io/layer: runtime-security
    hexstrike.io/component: talon
spec:
  type: ClusterIP
  ports:
    - name: webhook
      port: 9876
      targetPort: webhook
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app: talon

---
# SECURITY FIX: PriorityClass for HexStrike security components
# These components should never be evicted under resource pressure
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: hexstrike-security-critical
  labels:
    hexstrike.io/layer: runtime-security
    hexstrike.io/component: priority
    hexstrike.io/version: "1.0"
value: 1000000
globalDefault: false
description: "HexStrike security components (Falco, Talon, MCP Proxy) - should never be evicted under resource pressure"
preemptionPolicy: PreemptLowerPriority
