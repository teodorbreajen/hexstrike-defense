apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-proxy-config
  namespace: hexstrike-system
  labels:
    app: mcp-policy-proxy
    component: semantic-firewall
data:
  MCP_BACKEND_URL: "http://mcp-server:9090"
  LAKERA_API_KEY: ""
  LAKERA_URL: "https://api.lakera.ai"
  LAKERA_THRESHOLD: "70"
  RATE_LIMIT_PER_MINUTE: "60"
  LOG_LEVEL: "info"
  PROXY_TIMEOUT: "30"