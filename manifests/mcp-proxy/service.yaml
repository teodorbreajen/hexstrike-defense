apiVersion: v1
kind: Service
metadata:
  name: mcp-policy-proxy
  namespace: hexstrike-system
  labels:
    app: mcp-policy-proxy
    component: semantic-firewall
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: mcp-policy-proxy