# Phase 2: Network Security - Default Deny Egress
# CiliumClusterwideNetworkPolicy for hexstrike-defense
# 
# PURPOSE: Block ALL egress traffic by default
# SCOPE: Applies to all workloads in hexstrike namespaces
# 
# This is the foundation of Zero Trust networking.
# All outbound connections must be explicitly whitelisted.

# SECURITY FIX: Removed incorrect reserved:host selector
# The reserved:host selector only selects the host networking namespace,
# NOT the actual workloads. Now using proper namespace-based selection.

apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: hexstrike-default-deny-egress
  labels:
    hexstrike.io/layer: network-security
    hexstrike.io/policy-type: default-deny
    hexstrike.io/version: "1.1"
spec:
  # SECURITY FIX: Select workloads by namespace instead of reserved:host
  # This properly applies default-deny to all hexstrike workloads
  endpointSelector:
    matchLabels:
      # Match all pods (workloads, not host)
      # Individual namespace policies will be more specific
    matchExpressions:
      - key: kubernetes.io/os
        operator: NotIn
        values:
          - windows
      # SECURITY: Exclude host network pods from cluster-wide policy
      # They should have their own specific policies
      - key: endpoint-status.ingress-enforcement
        operator: Exists

  # DENY all egress by default
  # This rule blocks everything not explicitly allowed
  egressDeny:
    # Block all TCP
    - toPorts:
        - port: "0"
          protocol: TCP
    # Block all UDP  
    - toPorts:
        - port: "0"
          protocol: UDP
    # Block ICMP
    - toEntities:
        - remote-node

---
# Per-namespace default deny for agent workloads
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: hexstrike-agent-default-deny
  namespace: hexstrike-agents
  labels:
    hexstrike.io/layer: network-security
    hexstrike.io/policy-type: default-deny
    hexstrike.io/version: "1.1"
spec:
  endpointSelector:
    matchLabels:
      # Apply to all pods in hexstrike-agents namespace
      app.kubernetes.io/managed-by: hexstrike
    matchExpressions:
      # Include all pods without specific labels (catch-all)
      - key: app
        operator: Exists
  
  egressDeny:
    # Block all outbound connections
    - toPorts:
        - port: "0"
          protocol: TCP
    - toPorts:
        - port: "0"
          protocol: UDP

  # SECURITY FIX: Add ingress deny for defense-in-depth
  ingressDeny:
    - toPorts:
        - port: "0"
          protocol: TCP

---
# Per-namespace default deny for system namespace
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: hexstrike-system-default-deny
  namespace: hexstrike-system
  labels:
    hexstrike.io/layer: network-security
    hexstrike.io/policy-type: default-deny
    hexstrike.io/version: "1.1"
spec:
  endpointSelector:
    matchLabels:
      # Apply to all system pods
      hexstrike.io/component: system
    matchExpressions:
      - key: app
        operator: Exists
  
  egressDeny:
    - toPorts:
        - port: "0"
          protocol: TCP
    - toPorts:
        - port: "0"
          protocol: UDP

  # SECURITY FIX: Add ingress deny
  ingressDeny:
    - toPorts:
        - port: "0"
          protocol: TCP
