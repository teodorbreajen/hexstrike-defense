# openspec/config.yaml - hexstrike-defense
schema: spec-driven

context: |
  Tech stack: Kubernetes, LangGraph, MCP, eBPF, Go/TypeScript
  Architecture: Multi-layer defense-in-depth (SDD governance → Semantic firewall → Runtime detection → Network containment)
  Testing: Infrastructure project - e2e testing via k8s test frameworks (kind/minikube)
  Mode: Greenfield project

strict_tdd: false  # Infrastructure project - traditional TDD not applicable

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected components/manifests
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include architecture diagrams for defense layers
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow Kubernetes best practices
    - Load relevant coding skills for Go/TS components
  verify:
    - Run integration tests with kind cluster if available
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)

# Testing Capabilities (detected 2026-04-16)
testing:
  test_runner: "go test (Go built-in)"
  layers:
    unit: "NOT FOUND - No test files in src/mcp-policy-proxy/"
    integration: "AVAILABLE - k8s client-go in tests/e2e/framework/"
    e2e: "AVAILABLE - testify v1.8.4 + k8s client-go"
  coverage: "AVAILABLE - go test -cover"
  tools:
    linter: "NOT INSTALLED - golangci-lint"
    type_checker: "AVAILABLE - go vet"
    formatter: "AVAILABLE - gofmt"

# Issues Found
issues:
  - id: "missing-go-sum"
    severity: "high"
    description: "Missing go.sum files in all modules"
    fix: "Run 'go mod tidy' in each module directory"
  - id: "no-unit-tests"
    severity: "medium"
    description: "No unit tests in main application"
    fix: "Consider adding unit tests for proxy, rate limiter, metrics"
  - id: "e2e-deps"
    severity: "high"
    description: "E2E tests need dependencies downloaded"
    fix: "Run 'go mod download' in tests/e2e/"